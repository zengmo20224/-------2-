spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: file:./schema.sql

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

petcare:
  security:
    jwt-secret: tc-mysql-test-secret-key-at-least-32-characters-long
    jwt-issuer: petcare-o2o-api-tc-mysql-test
    jwt-expiration-minutes: 120
