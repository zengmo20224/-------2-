spring:
  datasource:
    url: jdbc:h2:mem:isolationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

petcare:
  security:
    jwt-secret: profile-isolation-test-secret-key-at-least-32-chars
    jwt-issuer: petcare-o2o-api-isolation
    jwt-expiration-minutes: 120
