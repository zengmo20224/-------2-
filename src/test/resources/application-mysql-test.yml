spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/petcare_o2o_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-mysql-test.sql

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

petcare:
  security:
    jwt-secret: test-secret-key-for-mysql-tests-at-least-32-chars
    jwt-issuer: petcare-o2o-api-mysql-test
    jwt-expiration-minutes: 120
