# 管理端 nginx 配置
# 关联文档：docs/07-deployment-guide.md §5.1
# CI：CI-RC-006

server {
    listen       80;
    server_name  _;

    # 静态资源根目录（由 Dockerfile COPY 进来）
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # 静态资源缓存（带 hash 的资源长期缓存）
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API 反向代理到后端容器（服务名 api，docker compose 网络内可解析）
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 后端上传文件（管理端预览图片等）
    location /uploads/ {
        proxy_pass         http://api:8080/uploads/;
        proxy_set_header   Host $host;
    }

    # SPA fallback：未匹配的路径回退到 index.html（vue-router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
