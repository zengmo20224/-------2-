# PetCare O2O — Docker Compose 单机编排
# 关联文档：docs/07-deployment-guide.md、docs/03-configuration-management-plan.md
# CI：CI-BS-011
#
# 启动：docker compose up -d --build --wait
# 停止：docker compose down
# 重置：docker compose down -v

name: petcare

services:
  # ---------- 数据库 ----------
  mysql:
    image: mysql:8.0
    container_name: petcare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-petcare_o2o}
      # 自动创建应用用户并授予 MYSQL_DATABASE 全部权限（仅卷为空首次初始化时生效）
      MYSQL_USER: ${DB_USERNAME:-petcare}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
      # 关键：强制客户端握手用 utf8mb4，避免 latin1 客户端导致中文双重编码
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
      # 首次启动自动初始化 schema + 种子数据（仅卷为空时执行）
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/data-dev.sql:/docker-entrypoint-initdb.d/02-data-dev.sql:ro
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - petcare-net

  # ---------- 后端 API ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: petcare-api:${IMAGE_TAG:-1.0.0}
    container_name: petcare-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-petcare_o2o}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${DB_USERNAME:-petcare}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-petcare-o2o-api}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      AI_PROVIDER_ENABLED: ${AI_PROVIDER_ENABLED:-false}
      TZ: Asia/Shanghai
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    ports:
      - "127.0.0.1:${API_PORT:-8082}:8080"
    volumes:
      - api-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/system/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - petcare-net

  # ---------- 管理端（PC Web）----------
  admin-web:
    build:
      context: .
      dockerfile: frontend/admin-web/Dockerfile
    image: petcare-admin-web:${IMAGE_TAG:-1.0.0}
    container_name: petcare-admin-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ADMIN_WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - petcare-net

  # ---------- 用户端 H5 ----------
  h5:
    build:
      context: .
      dockerfile: frontend/miniapp/Dockerfile
    image: petcare-h5:${IMAGE_TAG:-1.0.0}
    container_name: petcare-h5
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${H5_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - petcare-net

volumes:
  mysql-data:
    name: petcare-mysql-data
  api-uploads:
    name: petcare-api-uploads

networks:
  petcare-net:
    name: petcare-net
    driver: bridge
