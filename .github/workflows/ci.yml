# PetCare O2O — GitHub Actions CI 流水线
# 关联文档：docs/06-build-guide.md §4、docs/03-configuration-management-plan.md §9
# CI：CI-CI-004
#
# 触发：push 到任意分支 / PR 到 main、develop
# 内容：后端编译+测试+覆盖率、管理端 build+test、H5 build+test、归档报告

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

# 同分支只保留最新一次构建
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # 后端：编译 + 测试 + JaCoCo 覆盖率
  # ─────────────────────────────────────────────────────────
  backend:
    name: Backend (Maven + JaCoCo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: mvn -B -ntp -V clean compile

      - name: Test + Coverage
        run: mvn -B -ntp test

      - name: Package (skip tests，与 Jenkinsfile Backend Package 阶段对齐)
        run: mvn -B -ntp package -DskipTests

      - name: Upload runnable jar（对应 CI-BL-011）
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/petcare-o2o-api-*.jar
          if-no-files-found: error

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Upload Surefire XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────
  # 管理端：构建 + 契约测试
  # ─────────────────────────────────────────────────────────
  admin-web:
    name: Admin Web (Vite + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Contract tests
        run: npm run test:contract

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-dist
          path: frontend/admin-web/dist/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────
  # 用户端 H5：构建 + 单元测试
  # ─────────────────────────────────────────────────────────
  h5:
    name: H5 (UniApp + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/miniapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/miniapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Build H5
        run: npm run build:h5

      - name: Upload H5 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: h5-dist
          path: frontend/miniapp/dist/build/h5/
          if-no-files-found: warn
